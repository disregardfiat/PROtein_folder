name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      # Full-package ruff cleanup is tracked on the roadmap; CI enforces style on tests first.
      - name: Ruff check (tests)
        run: ruff check tests

      - name: Pytest
        run: pytest tests/ -q

      - name: MkDocs build
        run: mkdocs build

  # Optional: enable when JAX on GitHub-hosted runners is required for your org
